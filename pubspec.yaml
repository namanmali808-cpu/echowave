name: echowave
description: A premium music streaming application.
publish_to: 'none'
version: 1.0.5+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  go_router: ^12.1.1
  dio: ^5.4.0
  just_audio: ^0.9.36
  audio_service: ^0.18.12
  cached_network_image: ^3.3.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0
  permission_handler: ^11.2.0
  speech_to_text: ^7.4.0
  google_fonts: ^6.1.0
  equatable: ^2.0.5
  intl: ^0.19.0
  shimmer: ^3.0.0
  flutter_animate: ^4.3.0
  share_plus: ^7.2.1
  path_provider: ^2.1.1
  url_launcher: ^6.2.1
  connectivity_plus: ^5.0.2
  flutter_local_notifications: ^17.0.0
  package_info_plus: ^9.0.1
  youtube_explode_dart: ^2.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/
